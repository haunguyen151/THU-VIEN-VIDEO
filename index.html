<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNJ Luxury - Video Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fff9e6;
            -webkit-tap-highlight-color: transparent;
        }
        .pnj-blue { color: #002d5e; }
        .pnj-blue-bg { background-color: #002d5e; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .gold-border { border-color: rgba(212, 175, 55, 0.4); }
        .serif-font { font-family: 'Playfair Display', serif; }
        
        .video-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: #ffffff;
        }
        
        @media (hover: hover) {
            .video-card:hover {
                transform: translateY(-8px);
                box-shadow: 0 20px 40px rgba(0, 45, 94, 0.1);
            }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #fdf2d1; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 177.77%; /* Tỷ lệ 9:16 cho video portrait */
            background-color: #001f3f;
            overflow: hidden;
            border-radius: 1.5rem 1.5rem 0 0;
        }
        .video-container video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="text-[#002d5e] min-h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- SIDEBAR (Desktop) -->
    <aside class="hidden md:flex w-64 bg-[#001f3f] border-r gold-border p-6 flex-col shadow-2xl z-30">
        <div class="flex flex-col items-start gap-4 mb-10">
            <img src="logoPNJ_TRANG.png" alt="PNJ Logo" class="w-16 h-auto object-contain filter drop-shadow-md">
            <h1 class="serif-font text-lg gold-text tracking-widest uppercase border-t gold-border pt-4 w-full">PNJ ARCHIVE</h1>
        </div>

        <nav class="space-y-2 flex-1">
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl bg-[#d4af37]/15 text-amber-400 font-semibold border-l-4 border-[#d4af37]">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> <span>Thư viện chính</span>
            </a>
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all">
                <i data-lucide="folder" class="w-5 h-5"></i> <span>Dự án</span>
            </a>
        </nav>

        <div class="mt-auto pt-6 border-t gold-border text-slate-500 text-[10px] italic">
            <p>© 2026 PNJ Luxury System</p>
        </div>
    </aside>

    <!-- MOBILE HEADER -->
    <header class="md:hidden pnj-blue-bg p-4 flex justify-between items-center shadow-lg z-30">
        <img src="logoPNJ_TRANG.png" alt="PNJ Logo" class="h-8 w-auto">
        <div class="flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full border border-white/20">
            <i data-lucide="film" class="w-3 h-3 gold-text"></i>
            <span class="text-xs text-white font-bold">22 Sản phẩm</span>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Dashboard Header -->
        <header class="p-4 md:p-6 glass-effect border-b gold-border z-20 shadow-sm">
            <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="text-center sm:text-left">
                    <h2 class="serif-font text-2xl md:text-3xl pnj-blue uppercase tracking-tight">Thư viện Video</h2>
                    <p class="text-slate-500 text-[10px] md:text-xs font-medium uppercase tracking-widest">Lưu trữ lượt xem thực tế từ hệ thống</p>
                </div>
                
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <div class="relative flex-1 sm:flex-none">
                        <input type="text" id="searchInput" onkeyup="filterVideos()" placeholder="Tìm mã sản phẩm..." class="w-full bg-white border gold-border rounded-full py-2 px-10 focus:outline-none focus:ring-2 focus:ring-amber-500/20 text-sm pnj-blue shadow-inner">
                        <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                    </div>
                </div>
            </div>
        </header>

        <!-- Video Grid Area -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-7xl mx-auto">
                <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                    <!-- Cards injected by JS -->
                </div>
                
                <!-- Empty State -->
                <div id="noResult" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
                    <i data-lucide="search-x" class="w-16 h-16 mb-4 opacity-20"></i>
                    <p>Không tìm thấy mã sản phẩm phù hợp.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pnj-video-archive';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const videoTitles = [
            "GB0000W002980", "GBXMXMW003718", "GBXMXMW003741", "GBXMXMW003806", 
            "GBXMXMY011060", "GBXMXMY011061", "GC0000C000061", "GI0000Y000730", 
            "GI0000Y000778", "GMXMXMY010003", "GNDDDDW015506", "GNDDDDW015508", 
            "GV0000C000202", "GV0000C000203", "GV0000C000205", "GZ0000Y001382_BlindBox", 
            "SBXM00X000025", "SBXMXMC000054", "SCXM00X000016", "SLXM00X000005", 
            "SNZT00W000033", "SNZTXMW000047"
        ];

        const fileMapping = {
            "GB0000W002980": "GB0000W002980.mp4",
            "GBXMXMW003718": "GBXMXMW003718.mp4",
            "GBXMXMW003741": "GBXMXMW003741.mp4",
            "GBXMXMW003806": "GBXMXMW003806.mp4",
            "GBXMXMY011060": "GBXMXMY011060.mp4",
            "GBXMXMY011061": "GBXMXMY011061.mp4",
            "GC0000C000061": "GC0000C000061.mp4",
            "GNDDDDW015508": "GNDDDDW015508.mp4",
            "GI0000Y000730": "GI0000Y000730.mp4",
            "GI0000Y000778": "GI0000Y000778.mp4",
            "GMXMXMY010003": "GMXMXMY010003.mp4",
            "GNDDDDW015506": "GNDDDDW015506.mp4"
        };

        let currentUser = null;

        // AUTH
        const init = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) setupRealtimeViews();
        });

        // FIRESTORE VIEW TRACKING
        const setupRealtimeViews = () => {
            if (!currentUser) return;
            const statsCol = collection(db, 'artifacts', appId, 'public', 'data', 'videoStats');
            
            renderVideoGrid();

            // Listen for count changes
            onSnapshot(statsCol, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const videoId = change.doc.id;
                    const data = change.doc.data();
                    const viewEl = document.getElementById(`views-${videoId}`);
                    if (viewEl) {
                        viewEl.innerText = (data.count || 0).toLocaleString();
                        if (change.type === "modified") {
                            viewEl.classList.add('gold-text', 'scale-125', 'font-bold');
                            setTimeout(() => viewEl.classList.remove('scale-125'), 500);
                        }
                    }
                });
            });
        };

        // TRACKING ACTION
        window.handleAction = async (title, videoId) => {
            const video = document.getElementById(videoId);
            if (video) video.play();

            if (!currentUser) return;
            const sessionKey = `viewed_${title}`;
            if (sessionStorage.getItem(sessionKey)) return;

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'videoStats', title);
            try {
                const docSnap = await getDoc(docRef);
                if (!docSnap.exists()) {
                    await setDoc(docRef, { count: 1 });
                } else {
                    await updateDoc(docRef, { count: increment(1) });
                }
                sessionStorage.setItem(sessionKey, "true");
            } catch (e) {}
        };

        // RENDER UI
        function renderVideoGrid(filtered = null) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            
            const list = filtered || videoTitles;
            if (list.length === 0) {
                document.getElementById('noResult').classList.remove('hidden');
                return;
            } else {
                document.getElementById('noResult').classList.add('hidden');
            }

            list.forEach((title) => {
                const type = title.startsWith('S') ? 'Silver' : 'Gold';
                const url = fileMapping[title] || "https://assets.mixkit.co/videos/preview/mixkit-close-up-of-a-woman-showing-a-ring-43343-large.mp4";
                
                const card = document.createElement('div');
                card.className = "video-card rounded-[2rem] overflow-hidden border gold-border group flex flex-col h-full shadow-md";
                card.innerHTML = `
                    <div class="video-container">
                        <video id="vid-${title}" class="opacity-80 group-hover:opacity-100 transition-opacity duration-700" 
                               muted loop playsinline 
                               onmouseover="window.handleAction('${title}', 'vid-${title}')" 
                               onmouseout="this.pause()"
                               onclick="window.handleAction('${title}', 'vid-${title}')">
                            <source src="${url}" type="video/mp4">
                        </video>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent opacity-60 pointer-events-none"></div>
                        
                        <!-- Badges -->
                        <div class="absolute top-4 left-4">
                            <span class="text-[8px] font-bold px-2 py-1 rounded-full glass-effect border gold-border uppercase tracking-widest text-amber-600">Sản phẩm</span>
                        </div>

                        <!-- Views Count (Real-time from Firestore) -->
                        <div class="absolute top-4 right-4 flex items-center gap-1.5 bg-black/40 backdrop-blur-md px-3 py-1 rounded-full border border-white/10 text-white">
                            <i data-lucide="eye" class="w-3.5 h-3.5 gold-text"></i>
                            <span id="views-${title}" class="text-[11px] font-bold tracking-tighter">0</span>
                        </div>

                        <!-- Center Play Icon -->
                        <div class="absolute inset-0 m-auto w-12 h-12 gold-bg text-[#002d5e] rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all scale-75 group-hover:scale-100 pointer-events-none shadow-2xl">
                            <i data-lucide="play" class="w-5 h-5 fill-current ml-0.5"></i>
                        </div>
                    </div>

                    <div class="p-4 md:p-5 flex flex-col flex-1 bg-white">
                        <h3 class="serif-font text-base md:text-lg pnj-blue mb-1 tracking-tight group-hover:gold-text transition-colors uppercase font-bold truncate">${title}</h3>
                        <div class="flex items-center justify-between mt-auto pt-3 border-t border-slate-50">
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${type} Collection</span>
                            <div class="w-6 h-6 rounded-full pnj-blue-bg flex items-center justify-center text-[7px] text-white font-black">PNJ</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        window.filterVideos = () => {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const res = videoTitles.filter(t => t.toLowerCase().includes(q));
            renderVideoGrid(res);
        };

        init();
    </script>
</body>
</html>
