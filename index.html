<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNJ Luxury - Real-time Video Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fff9e6;
        }
        .pnj-blue { color: #002d5e; }
        .pnj-blue-bg { background-color: #002d5e; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .gold-border { border-color: rgba(212, 175, 55, 0.4); }
        .serif-font { font-family: 'Playfair Display', serif; }
        
        .video-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: #ffffff;
        }
        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 45, 94, 0.1);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #fdf2d1; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-[#002d5e] min-h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-[#001f3f] border-r gold-border p-6 flex flex-col hidden md:flex shadow-2xl z-20">
        <div class="flex flex-col items-start gap-4 mb-10">
            <img src="logoPNJ_TRANG.png" alt="PNJ Logo" class="w-16 h-auto object-contain filter drop-shadow-lg">
            <h1 class="serif-font text-xl gold-text tracking-widest uppercase border-t gold-border pt-4 w-full">THƯ VIỆN VIDEO</h1>
        </div>

        <nav class="space-y-2 flex-1">
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl bg-[#d4af37]/10 text-amber-400 font-semibold border-l-4 border-[#d4af37]">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Tổng quan
            </a>
            <div class="flex items-center gap-3 p-3 rounded-xl text-slate-400">
                <i data-lucide="users" class="w-5 h-5 text-green-500"></i> 
                <span class="text-xs">Đang xem: <b id="onlineCount" class="text-white">1</b></span>
            </div>
        </nav>

        <div class="mt-auto pt-6 border-t gold-border text-slate-500 text-[10px]">
            <p>Dữ liệu thời gian thực</p>
            <p>Powered by Cloud Sync</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#fff9e6]">
        <header class="p-6 bg-[#fff9e6]/90 backdrop-blur-md border-b gold-border z-10 shadow-sm">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="p-2 pnj-blue-bg rounded-lg md:hidden">
                        <img src="logoPNJ_TRANG.png" alt="PNJ Logo" class="w-8 h-auto">
                    </div>
                    <div>
                        <h2 class="serif-font text-3xl pnj-blue uppercase tracking-tight">THƯ VIỆN VIDEO</h2>
                        <p class="text-slate-500 text-xs italic">Hệ thống đo lường lượt xem thực tế cho 22 sản phẩm.</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <input type="text" id="searchInput" onkeyup="filterVideos()" placeholder="Tìm mã sản phẩm..." class="bg-white border gold-border rounded-full py-2 px-10 focus:outline-none focus:ring-1 focus:ring-amber-500 text-sm w-48 md:w-64 text-[#002d5e] shadow-inner">
                        <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                    </div>
                    <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full border gold-border shadow-sm">
                        <span id="totalClips" class="text-sm font-bold pnj-blue">22</span>
                        <span class="text-[10px] text-slate-400 uppercase font-bold">Clips</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-10">
            <div class="max-w-7xl mx-auto">
                <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    <!-- Cards will be injected by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Cấu hình môi trường (Giả định biến hệ thống đã sẵn sàng)
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pnj-video-archive';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const videoTitles = [
            "GB0000W002980", "GBXMXMW003718", "GBXMXMW003741", "GBXMXMW003806", 
            "GBXMXMY011060", "GBXMXMY011061", "GC0000C000061", "GI0000Y000730", 
            "GI0000Y000778", "GMXMXMY010003", "GNDDDDW015506", "GNDDDDW015508", 
            "GV0000C000202", "GV0000C000203", "GV0000C000205", "GZ0000Y001382_BlindBox", 
            "SBXM00X000025", "SBXMXMC000054", "SCXM00X000016", "SLXM00X000005", 
            "SNZT00W000033", "SNZTXMW000047"
        ];

        const fileMapping = {
            "GB0000W002980": "GB0000W002980.mp4",
            "GBXMXMW003718": "GBXMXMW003718.mp4",
            "GBXMXMW003741": "GBXMXMW003741.mp4",
            "GBXMXMW003806": "GBXMXMW003806.mp4",
            "GBXMXMY011060": "GBXMXMY011060.mp4",
            "GBXMXMY011061": "GBXMXMY011061.mp4",
            "GC0000C000061": "GC0000C000061.mp4",
            "GNDDDDW015508": "GNDDDDW015508.mp4",
            "GI0000Y000730": "GI0000Y000730.mp4",
            "GI0000Y000778": "GI0000Y000778.mp4",
            "GMXMXMY010003": "GMXMXMY010003.mp4",
            "GNDDDDW015506": "GNDDDDW015506.mp4"
        };

        let userUid = null;

        // 1. Khởi tạo Auth
        const init = async () => {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userUid = user.uid;
                    listenToViews();
                    updateOnlineStatus();
                }
            });
        };

        // 2. Lắng nghe thay đổi views Real-time
        const listenToViews = () => {
            const publicDataCol = collection(db, 'artifacts', appId, 'public', 'data', 'videoStats');
            
            // Render grid ban đầu
            renderInitialGrid();

            // Đăng ký lắng nghe Firestore
            onSnapshot(publicDataCol, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const data = change.doc.data();
                    const viewEl = document.getElementById(`views-${change.doc.id}`);
                    if (viewEl) {
                        viewEl.innerText = data.count || 0;
                        if (change.type === "modified") {
                            viewEl.classList.add('gold-text', 'scale-125');
                            setTimeout(() => viewEl.classList.remove('scale-125'), 500);
                        }
                    }
                });
            }, (error) => console.error("Snapshot error:", error));
        };

        // 3. Tăng view thật khi Hover
        window.handleRealView = async (videoTitle) => {
            if (!userUid) return;
            const sessionKey = `viewed_${videoTitle}`;
            if (sessionStorage.getItem(sessionKey)) return;

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'videoStats', videoTitle);
            
            try {
                const docSnap = await getDoc(docRef);
                if (!docSnap.exists()) {
                    await setDoc(docRef, { count: 1 });
                } else {
                    await updateDoc(docRef, { count: increment(1) });
                }
                sessionStorage.setItem(sessionKey, "true");
            } catch (e) {
                console.error("Update view error:", e);
            }
        };

        function renderInitialGrid() {
            const videoGrid = document.getElementById('videoGrid');
            videoGrid.innerHTML = '';
            
            videoTitles.forEach((title, index) => {
                const tech = title.startsWith('S') ? 'Silver Collection' : 'Gold Jewelry';
                const url = fileMapping[title] || "https://assets.mixkit.co/videos/preview/mixkit-close-up-of-a-woman-showing-a-ring-43343-large.mp4";
                
                const card = document.createElement('div');
                card.className = "video-card rounded-3xl overflow-hidden border gold-border group relative flex flex-col h-full shadow-lg shadow-amber-900/5";
                card.innerHTML = `
                    <div class="relative aspect-[9/16] bg-[#001f3f] flex items-center justify-center overflow-hidden">
                        <video class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-500" 
                               muted loop onmouseover="this.play(); window.handleRealView('${title}')" onmouseout="this.pause()">
                            <source src="${url}" type="video/mp4">
                        </video>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent opacity-60"></div>
                        <div class="absolute top-4 left-4">
                            <span class="text-[9px] font-bold px-2 py-1 rounded-full glass-effect border gold-border uppercase tracking-widest text-amber-600">Premium</span>
                        </div>
                        <div class="absolute top-4 right-4 flex items-center gap-1.5 bg-black/40 backdrop-blur-md px-2.5 py-1 rounded-full border border-white/10 text-white">
                            <i data-lucide="eye" class="w-3 h-3 gold-text"></i>
                            <span id="views-${title}" class="text-[10px] font-semibold transition-all duration-500">0</span>
                        </div>
                        <div class="absolute inset-0 m-auto w-14 h-14 gold-bg text-[#002d5e] rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all scale-75 group-hover:scale-100 pointer-events-none shadow-2xl">
                            <i data-lucide="play" class="w-6 h-6 fill-current"></i>
                        </div>
                    </div>
                    <div class="p-5 flex flex-col flex-1">
                        <h3 class="serif-font text-lg pnj-blue mb-1 tracking-tight group-hover:gold-text transition-colors uppercase font-bold">${title}</h3>
                        <p class="text-[10px] text-slate-400 mb-4 flex items-center gap-1 uppercase tracking-widest font-bold">
                            <i data-lucide="tag" class="w-3 h-3 text-amber-500"></i> ${tech}
                        </p>
                        <div class="mt-auto pt-4 border-t border-slate-100 flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-full pnj-blue-bg flex items-center justify-center text-[7px] text-white font-bold">PNJ</div>
                                <span class="text-[9px] text-slate-400 font-medium">REAL-TIME</span>
                            </div>
                        </div>
                    </div>
                `;
                videoGrid.appendChild(card);
            });
            lucide.createIcons();
        }

        // Giả lập trạng thái Online đơn giản
        function updateOnlineStatus() {
            const count = Math.floor(Math.random() * 5) + 1; // Giả lập số người xem thực tế
            document.getElementById('onlineCount').innerText = count;
        }

        init();
    </script>
</body>
</html>
