<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNJ Luxury - Video Library Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #002d5e;
        }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .gold-border { border-color: rgba(212, 175, 55, 0.4); }
        .serif-font { font-family: 'Playfair Display', serif; }
        
        .video-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.2);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #001f3f; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
        
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }

        .glass-effect {
            background: rgba(0, 31, 63, 0.7);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-[#001f3f] border-r gold-border p-6 flex flex-col hidden md:flex">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 gold-bg rounded-full flex items-center justify-center text-[#002d5e]">
                <i data-lucide="gem" class="w-6 h-6"></i>
            </div>
            <h1 class="serif-font text-xl gold-text tracking-widest uppercase">PNJ Archive</h1>
        </div>

        <nav class="space-y-2 flex-1">
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl bg-[#d4af37]/10 text-amber-400 font-semibold border-l-4 border-[#d4af37]">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Tổng quan
            </a>
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition-all text-slate-400 hover:text-white">
                <i data-lucide="video" class="w-5 h-5"></i> Sản phẩm (22)
            </a>
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition-all text-slate-400 hover:text-white">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Thống kê
            </a>
        </nav>

        <div class="mt-auto pt-6 border-t gold-border">
            <div class="p-3 glass-effect rounded-2xl border gold-border">
                <p class="text-[10px] text-slate-500 uppercase mb-1">Dung lượng bộ nhớ</p>
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                    <div class="bg-amber-500 h-full" style="width: 45%"></div>
                </div>
                <p class="text-[10px] text-right mt-1 text-amber-500/80">450MB / 1GB</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="p-6 bg-[#002d5e]/90 backdrop-blur-md border-b gold-border z-10 shadow-xl">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h2 class="serif-font text-3xl gold-text uppercase tracking-tight">Luxury Video Library</h2>
                    <p class="text-slate-400 text-xs">Thư viện lưu trữ 22 thước phim sản phẩm PNJ cao cấp.</p>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <input type="text" id="searchInput" onkeyup="filterVideos()" placeholder="Tìm mã sản phẩm..." class="bg-[#001f3f] border gold-border rounded-full py-2 px-10 focus:outline-none focus:ring-1 focus:ring-amber-500 text-sm w-48 md:w-64 text-white">
                        <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-500"></i>
                    </div>
                    <div class="flex items-center gap-2 bg-[#001f3f] px-4 py-2 rounded-full border gold-border">
                        <span id="totalClips" class="text-sm font-bold gold-text">22</span>
                        <span class="text-[10px] text-slate-500 uppercase">Clips</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Video Display Area -->
        <div class="flex-1 overflow-y-auto p-6 md:p-10">
            <div class="max-w-7xl mx-auto">
                <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    <!-- JS renders videos here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Danh sách 22 video theo tên từ hình ảnh
        const videoTitles = [
            "GB0000W002980", "GBXMXMW003718", "GBXMXMW003741", "GBXMXMW003806", 
            "GBXMXMY011060", "GBXMXMY011061", "GC0000C000061", "GI0000Y000730", 
            "GI0000Y000778", "GMXMXMY010003", "GNDDDDW015506", "GNDDDDW015508", 
            "GV0000C000202", "GV0000C000203", "GV0000C000205", "GZ0000Y001382_BlindBox", 
            "SBXM00X000025", "SBXMXMC000054", "SCXM00X000016", "SLXM00X000005", 
            "SNZT00W000033", "SNZTXMW000047"
        ];

        // Tạo dữ liệu cho 22 video
        const videoData = videoTitles.map((title, index) => ({
            id: index + 1,
            title: title,
            tech: title.startsWith('S') ? 'Silver Collection' : 'Gold Jewelry',
            date: "24/03/2026",
            views: Math.floor(Math.random() * 200) + 20,
            // Link video mẫu - Bạn hãy thay link thực tế của bạn tại đây
            url: "https://assets.mixkit.co/videos/preview/mixkit-close-up-of-a-woman-showing-a-ring-43343-large.mp4" 
        }));

        const videoGrid = document.getElementById('videoGrid');

        function renderVideos(data) {
            videoGrid.innerHTML = '';
            data.forEach(video => {
                const card = document.createElement('div');
                card.className = "video-card bg-[#001f3f] rounded-3xl overflow-hidden border gold-border group relative flex flex-col h-full";
                card.innerHTML = `
                    <div class="relative aspect-[9/16] bg-black flex items-center justify-center overflow-hidden">
                        <video id="video-${video.id}" class="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-opacity duration-500" 
                               muted loop onmouseover="this.play(); handleView(${video.id})" onmouseout="this.pause()">
                            <source src="${video.url}" type="video/mp4">
                        </video>
                        
                        <!-- Gradient Overlay -->
                        <div class="absolute inset-0 bg-gradient-to-t from-[#001f3f] via-transparent to-transparent opacity-60"></div>

                        <!-- Top Badge -->
                        <div class="absolute top-4 left-4">
                            <span class="text-[9px] font-bold px-2 py-1 rounded-full glass-effect border gold-border uppercase tracking-widest text-amber-500">Premium</span>
                        </div>

                        <!-- View Count Badge -->
                        <div class="absolute top-4 right-4 flex items-center gap-1.5 bg-black/40 backdrop-blur-md px-2.5 py-1 rounded-full border border-white/10">
                            <i data-lucide="eye" class="w-3 h-3 gold-text"></i>
                            <span id="views-${video.id}" class="text-[10px] font-semibold">${video.views}</span>
                        </div>

                        <!-- Play Button Overlay -->
                        <div class="absolute inset-0 m-auto w-14 h-14 gold-bg text-[#002d5e] rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all scale-75 group-hover:scale-100 pointer-events-none shadow-2xl">
                            <i data-lucide="play" class="w-6 h-6 fill-current"></i>
                        </div>
                    </div>

                    <div class="p-5 flex flex-col flex-1">
                        <h3 class="serif-font text-lg gold-text mb-1 tracking-tight group-hover:text-white transition-colors uppercase">${video.title}</h3>
                        <p class="text-[10px] text-slate-500 mb-4 flex items-center gap-1 uppercase tracking-widest font-semibold">
                            <i data-lucide="tag" class="w-3 h-3"></i> ${video.tech}
                        </p>
                        
                        <div class="mt-auto pt-4 border-t border-white/5 flex justify-between items-center">
                            <div class="flex -space-x-2">
                                <div class="w-6 h-6 rounded-full border border-[#001f3f] bg-slate-700 flex items-center justify-center text-[8px]">PNJ</div>
                            </div>
                            <button class="hover:text-amber-400 transition-colors text-slate-400">
                                <i data-lucide="download" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
                videoGrid.appendChild(card);
            });
            lucide.createIcons();
        }

        // Xử lý đếm lượt xem (giả lập và lưu trạng thái phiên)
        function handleView(id) {
            const storageKey = `viewed_session_${id}`;
            if (!sessionStorage.getItem(storageKey)) {
                const viewSpan = document.getElementById(`views-${id}`);
                let count = parseInt(viewSpan.innerText);
                count++;
                viewSpan.innerText = count;
                viewSpan.classList.add('gold-text', 'scale-110');
                sessionStorage.setItem(storageKey, "true");
                
                // Hiệu ứng nhảy số
                setTimeout(() => viewSpan.classList.remove('scale-110'), 300);
            }
        }

        // Tìm kiếm video
        function filterVideos() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = videoData.filter(v => v.title.toLowerCase().includes(query));
            renderVideos(filtered);
        }

        // Khởi tạo Dashboard
        window.onload = () => {
            renderVideos(videoData);
            document.getElementById('totalClips').innerText = videoData.length;
        };
    </script>
</body>
</html>
